<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — RexumeAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

  <!-- ── AUTH GUARD: shown while checking session ── -->
  <div id="auth-loading">
    <div class="auth-loading-spinner"></div>
  </div>

  <!-- ── APP SHELL (hidden until auth confirmed) ── -->
  <div id="app" class="app-shell" style="display:none">

    <!-- ════════════════════════════════
         SIDEBAR
    ═════════════════════════════════ -->
    <aside id="sidebar" class="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <img src="/RexumeAI LOGO.jpeg" alt="RexumeAI" class="sidebar-logo-img">
        <span class="sidebar-logo-name">RexumeAI</span>
      </div>

      <!-- Nav links -->
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active" data-page="home">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          <span class="sidebar-label">Dashboard</span>
        </a>
        <a href="#" class="sidebar-link" data-page="resumes">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </span>
          <span class="sidebar-label">My Resumes</span>
        </a>
        <a href="#" class="sidebar-link" data-page="ai-tools">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
          </span>
          <span class="sidebar-label">AI Tools</span>
        </a>
        <a href="#" class="sidebar-link" data-page="settings">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
          <span class="sidebar-label">Settings</span>
        </a>
        <a href="#" class="sidebar-link" data-page="help">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </span>
          <span class="sidebar-label">Help & FAQ</span>
        </a>
      </nav>

      <!-- Collapse toggle -->
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <!-- Logout -->
      <div class="sidebar-footer">
        <button id="logout-btn" class="sidebar-logout">
          <span class="sidebar-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </span>
          <span class="sidebar-label">Log Out</span>
        </button>
      </div>
    </aside>

    <!-- ════════════════════════════════
         MAIN CONTENT
    ═════════════════════════════════ -->
    <main id="main-content" class="main-content">

      <!-- Mobile header -->
      <div class="mobile-header">
        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="mobile-logo">
          <img src="/RexumeAI LOGO.jpeg" alt="RexumeAI">
          <span>RexumeAI</span>
        </div>
      </div>

      <!-- Page container — content injected by router -->
      <div id="page-container" class="page-container"></div>

    </main>
  </div>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <script type="module" src="/src/dashboard/index.ts"></script>
</body>
</html>
